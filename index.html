<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist - Triagem Hospitalar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="sliders"></i>
                <h3>Ajustes do Agente</h3>
            </div>
            
            <div class="input-group">
                <label for="apiKey">Chave API OpenRouter</label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-...">
            </div>

            <div class="input-group">
                <label for="systemPrompt">Prompt do Sistema (Instruções)</label>
                <textarea id="systemPrompt" rows="12"></textarea>
            </div>

            <button class="btn-save" onclick="salvarConfiguracoes()">Aplicar Alterações</button>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="status-dot"></div>
                <div>
                    <h2>MedAssist - IA</h2>
                    <p>Triagem e Atendimento Virtual Hospitalar</p>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message agent">Olá! Sou o MedAssist, assistente virtual de triagem. Como posso ajudar você hoje?</div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="userInput" placeholder="Digite seus sintomas ou dúvidas aqui..." onkeypress="verificarEnter(event)">
                <button class="btn-send" onclick="enviarMensagem()">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
